<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PandaPaus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:       #39a79e;
      --dark-bg:    #0d1117;
      --soft-white: #f9f9f9;
      --text-gray:  #393939;
      --light-gray: #9a9a9a;
    }

    /* Reset and Base Styles */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--soft-white);
      color: var(--text-gray);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation Bar */
    /* Navigation Bar - Updated to Azure Teal */
.navbar {
  width: 100%;
  height: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8%;
  background-color: var(--teal); /* Azure Teal Background */
  border-bottom: none; /* No border needed since it's a solid brand block */
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  color: var(--soft-white);
  font-weight: 400; /* Removed bold */
  font-size: 1.6rem;
  letter-spacing: -0.02em;
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 30px;
}

.nav-item {
  color: var(--soft-white); /* Soft White text */
  text-decoration: none;
  font-weight: 500;
  font-size: 1rem;
  opacity: 0.9;
  transition: opacity 0.2s ease;
}

.nav-item:hover {
  opacity: 1; /* Subtle hover effect instead of color change */
  text-decoration: underline; /* Optional: adds a nice "active" feel */
}

    /* Main Content Area */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(3.5rem, 15vw, 8rem);
      font-weight: 800;
      color: var(--teal);
      letter-spacing: -0.04em;
      line-height: 0.9;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text-gray);
      margin-top: 1.5rem;
      max-width: 600px;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 2.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--light-gray);
      letter-spacing: 0.02em;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">PandaPaus</a>
    <div class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/contact/" class="nav-item">Contact</a>
    </div>
  </nav>

  <main>
    <h1>PandaPaus</h1>
    
  </main>

  <footer>
    &copy; 2026 PandaPaus
  </footer>

</body>
</html>
